    post:
      tags:
      - ApiKeys
      x-fern-sdk-group-name: apiKeys
      operationId: issueApiKey
      x-fern-sdk-method-name: issue
      summary: Mint a tenant API key (plaintext token returned once)
      description: |
        Mints a durable, tenant-scoped control-plane API key
        (`ao_<env>_<random>`) for tenant-to-server access (SDKs, CI). The
        key inherits the caller's RBAC role. The plaintext token is
        returned once in the `token` field; the server stores only
        HMAC-SHA256(token, pepper).
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/IssueTenantKeyRequest"
      responses:
        '201':
          description: Key issued — plaintext token shown once.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TenantAPIKeyIssued"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '403':
          "$ref": "#/components/responses/Error"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/api/api-keys/{id}":
    delete:
      tags:
      - ApiKeys
      x-fern-sdk-group-name: apiKeys
      operationId: revokeApiKey
      x-fern-sdk-method-name: revoke
      summary: Revoke a tenant API key
      description: |
        Revokes one key. Members can revoke only their own keys;
        admins and owners can revoke any key in the tenant.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          "$ref": "#/components/responses/NoContent"
        '404':
          "$ref": "#/components/responses/NotFound"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Tenant-scoped API key as a bearer token (format `ao_<env>_<random>`),
        minted in the dashboard under Settings -> API Keys. The key inherits
        the minter's role. Send as `Authorization: Bearer <token>`.
      x-fern-bearer:
        name: token
        env: AGENT_ORC_API_KEY
  parameters:
    TenantId:
      name: X-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        default: default
      description: Tenant slug. Omit for the `default` tenant.
  schemas:
    Error:
      type: object
      required:
      - error
      properties:
        error:
          type: string
    Object:
      type: object
      additionalProperties: true
    BillingPack:
      type: object
      description: One purchasable credit top-up.
      required:
      - cents
      - usd
      properties:
        cents:
          type: integer
          description: Pack price in USD cents.
        usd:
          type: number
          format: double
    BillingWallet:
      type: object
      description: The tenant's credit wallet as the dashboard sees it.
      required:
      - configured
      - balanceMicroUSD
      - balanceUSD
      - packs
      properties:
        configured:
          type: boolean
          description: False when the tenant has no wallet yet (no credits granted).
        balanceMicroUSD:
          type: number
          format: double
        balanceUSD:
          type: number
          format: double
        packs:
          type: array
          items:
            "$ref": "#/components/schemas/BillingPack"
    BillingCheckoutRequest:
      type: object
      required:
      - cents
      properties:
        cents:
          type: integer
          description: A known pack amount in USD cents.
    BillingCheckoutResponse:
      type: object
      required:
      - url
      properties:
        url:
          type: string
          description: Polar checkout URL to redirect the browser to.
    Profile:
      type: object
      required:
      - name
      - runtime
      description: |
        Reusable agent definition. Binds a runtime (claude, codex, ...) to a
        system prompt, skills, tools, and an optional sandbox/FS policy.
      properties:
        id:
          type: string
          description: Auto-assigned on registration ("agent-<hex>") when empty.
        name:
          type: string
        runtime:
          type: string
          description: Runtime label (e.g. claude, codex).
        systemPrompt:
          type: string
        skills:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
          description: |
            Tool selectors. Names, globs ("web.*"), or @-sentinels
            (@default, @fs, @pool, @orchestration, @artifacts).
        mcpServers:
          type: array
          items:
            "$ref": "#/components/schemas/MCPServerSpec"
        model:
          type: string
        fs:
          "$ref": "#/components/schemas/FSPolicy"
        sandbox:
          "$ref": "#/components/schemas/SandboxSpec"
    ProfileList:
      type: array
      items:
        "$ref": "#/components/schemas/Profile"
    MCPServerSpec:
      type: object
      required:
      - name
      - transport
      - url
      properties:
        name:
          type: string
        transport:
          type: string
          description: '"http" or "sse".'
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
          description: |
            Header values support literal strings, "${VAR}" env expansion,
            or "secret://name" references resolved via the secrets manager.
    FSPolicy:
      type: object
      description: |
        Per-profile filesystem access policy. Glob patterns may use
        `*`, `**`, and the tokens `{self}`, `{pool}`, `{role}`. The
        agent's home (`/agents/{self}/**`) is always granted implicitly.
      properties:
        read:
          type: array
          items:
            type: string
        write:
          type: array
          items:
            type: string
        delete:
          type: array
          items:
            type: string
        deny:
          type: array
          items:
            type: string
    SandboxSpec:
      type: object
      required:
      - provider
      properties:
        provider:
          type: string
        template:
          type: string
        resources:
          "$ref": "#/components/schemas/SandboxResources"
        env:
          type: object
          additionalProperties:
            type: string
        idleTimeout:
          type: integer
          description: Idle TTL in nanoseconds (Go time.Duration).
    SandboxResources:
      type: object
      properties:
        cpu:
          type: integer
          description: Millicores.
        memoryMB:
          type: integer
        diskMB:
          type: integer
        timeout:
          type: integer
          description: Wall-clock cap in nanoseconds (Go time.Duration).
    ProfileChange:
      type: object
      required:
      - id
      - profile
      - action
      - at
      properties:
        id:
          type: string
        profile:
          type: string
        action:
          type: string
          description: '"created", "updated", or "deleted".'
        at:
          type: string
          format: date-time
        fields:
          type: array
          items:
            type: string
        before:
          "$ref": "#/components/schemas/Profile"
        after:
          "$ref": "#/components/schemas/Profile"
    ProfileChangeList:
      type: array
      items:
        "$ref": "#/components/schemas/ProfileChange"
    Pool:
      type: object
      required:
      - name
      - members
      description: |
        Named group of profiles that share an FS workspace under
        `/pools/{name}/**`. Layered on top of each member's profile
        sandbox; never replaces or shrinks per-profile access.
      properties:
        id:
          type: string
          description: Auto-assigned on registration ("pool-<hex>") when empty.
        name:
          type: string
        description:
          type: string
        members:
          type: array
          items:
            "$ref": "#/components/schemas/PoolMember"
        fs:
          "$ref": "#/components/schemas/PoolFSPolicy"
    PoolMember:
      type: object
      required:
      - profile
      properties:
        profile:
          type: string
        role:
          type: string
          description: lead | member | observer (defaults to member).
    PoolFSPolicy:
      type: object
      description: |
        Extra FS glob lists contributed by the pool to every member's
        effective policy. Read/Write/Delete are additive; Deny subtracts.
      properties:
        read:
          type: array
          items:
            type: string
        write:
          type: array
          items:
            type: string
        delete:
          type: array
          items:
            type: string
        deny:
          type: array
          items:
            type: string
    PoolList:
      type: array
      items:
        "$ref": "#/components/schemas/Pool"
    Session:
      type: object
      required:
      - id
      - profile
      - runtime
      - status
      - createdAt
      - lastUsedAt
      - runCount
      description: |
        Live agent instance bound to a profile. The lastRun* / lastPrompt
        fields are populated from the run registry so callers (especially
        orchestrators) can decide whether an existing session matches the
        current episode before spawning a new one.
      properties:
        id:
          type: string
        profile:
          type: string
        runtime:
          type: string
        status:
          type: string
          description: idle | running | errored | shutdown.
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        lastPrompt:
          type: string
        lastRunStartedAt:
          type: string
          format: date-time
        lastRunFinishedAt:
          type: string
          format: date-time
        lastRunStatus:
          type: string
        runCount:
          type: integer
    SessionList:
      type: array
      items:
        "$ref": "#/components/schemas/Session"
    SubTask:
      type: object
      required:
      - id
      - profile
      - sessionId
      - title
      description: Unit of work the planner emits and an AgentRuntime consumes.
      properties:
        id:
          type: string
        parentId:
          type: string
        profile:
          type: string
        sessionId:
          type: string
        title:
          type: string
        prompt:
          type: string
        files:
          type: array
          items:
            type: string
    RunSummary:
      type: object
      required:
      - id
      - subTask
      - status
      - startedAt
      properties:
        id:
          type: string
        subTask:
          "$ref": "#/components/schemas/SubTask"
        status:
          type: string
          description: running | ok | error | cancelled.
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    RunSummaryList:
      type: array
      items:
        "$ref": "#/components/schemas/RunSummary"
    RunCreateRequest:
      allOf:
      - "$ref": "#/components/schemas/SubTask"
      description: |
        SubTask body for POST /api/runs. `profile` is required; `sessionId`
        and `id` are minted server-side when omitted.
    Usage:
      type: object
      description: Token-and-cache accounting reported by the underlying SDK.
      properties:
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        cacheReadTokens:
          type: integer
        cacheCreateTokens:
          type: integer
    Event:
      type: object
      required:
      - type
      description: |
        Single event in a run's stream. `type` selects which fields apply:
          - progress / result / error / assistant: `message`.
          - tool_call: `toolCallId`, `toolName`, `input`.
          - tool_result: `toolCallId`, `output`, `isError`.
          - usage: `usage`.
      properties:
        type:
          type: string
          description: progress | result | error | assistant | tool_call | tool_result
            | usage.
        message:
          type: string
        ts:
          type: string
          format: date-time
        toolCallId:
          type: string
        toolName:
          type: string
        input:
          "$ref": "#/components/schemas/Object"
        output:
          "$ref": "#/components/schemas/Object"
        isError:
          type: boolean
        usage:
          "$ref": "#/components/schemas/Usage"
    RunDetail:
      allOf:
      - "$ref": "#/components/schemas/RunSummary"
      - type: object
        required:
        - events
        properties:
          events:
            type: array
            items:
              "$ref": "#/components/schemas/Event"
    PlanNode:
      type: object
      required:
      - id
      - title
      - profile
      - promptTemplate
      - status
      - attempt
      properties:
        id:
          type: string
        title:
          type: string
        profile:
          type: string
        sessionId:
          type: string
        promptTemplate:
          type: string
        dependsOn:
          type: array
          items:
            type: string
        outputSchema:
          "$ref": "#/components/schemas/Object"
          description: Optional JSON Schema used to parse structured output.
        status:
          type: integer
          description: |
            NodeStatus enum value (pending=0, ready=1, running=2, ok=3,
            error=4, skipped=5, cancelled=6).
        runId:
          type: string
        output:
          type: string
        fields:
          "$ref": "#/components/schemas/Object"
          description: Structured fields parsed via outputSchema, if any.
        error:
          type: string
        attempt:
          type: integer
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    Plan:
      type: object
      required:
      - id
      - userPrompt
      - status
      - autoStart
      - nodes
      - createdAt
      - repairCount
      properties:
        id:
          type: string
        userPrompt:
          type: string
        orchestratorRunId:
          type: string
        orchestratorSessionId:
          type: string
        status:
          type: integer
          description: |
            PlanStatus enum value (pending=0, running=1, paused=2,
            completed=3, failed=4, cancelled=5).
        autoStart:
          type: boolean
        nodes:
          type: array
          items:
            "$ref": "#/components/schemas/PlanNode"
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        repairCount:
          type: integer
        deadline:
          type: string
          format: date-time
          description: Absolute wall-clock cutoff. Zero (omitted) means no overall
            timeout.
        delegationDepth:
          type: integer
    PlanList:
      type: array
      items:
        "$ref": "#/components/schemas/Plan"
    PlanCreateRequest:
      type: object
      required:
      - userPrompt
      - nodes
      properties:
        userPrompt:
          type: string
        nodes:
          type: array
          items:
            "$ref": "#/components/schemas/PlanNode"
          description: Inbound `status` fields are ignored — the engine drives transitions.
        autoStart:
          type: boolean
          description: Defaults to true.
        orchestratorRunId:
          type: string
        orchestratorSessionId:
          type: string
        deadline:
          type: string
          format: date-time
        delegationDepth:
          type: integer
    NodeStatusUpdate:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          description: ok | error | skipped | cancelled.
        output:
          type: string
        error:
          type: string
    Skill:
      type: object
      required:
      - name
      - body
      description: |
        Named, versioned instruction body managed by the skill catalog.
        `body` is the SKILL.md content; `resources` carries supporting
        files (scripts/, references/, assets/) per the Agent Skills spec.
      properties:
        name:
          type: string
        description:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
          description: '"user" | "imported".'
        resources:
          type: array
          items:
            "$ref": "#/components/schemas/SkillResource"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SkillResource:
      type: object
      required:
      - path
      properties:
        path:
          type: string
          description: Path relative to the skill root, e.g. `scripts/run.sh`.
        content:
          type: string
          description: Raw bytes, base64-encoded on the wire.
          format: byte
        size:
          type: integer
        description:
          type: string
    SkillList:
      type: array
      items:
        "$ref": "#/components/schemas/Skill"
    MCPServer:
      type: object
      required:
      - name
      - transport
      - url
      description: |
        MCPServerCatalogEntry — flattened MCPServerSpec plus an optional
        human-readable description. Profiles copy entries from this
        catalog into AgentProfile.MCPServers at authoring time.
      properties:
        name:
          type: string
        transport:
          type: string
          description: '"http" or "sse".'
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
          description: |
            Header values support literal strings, "${VAR}" env expansion,
            or "secret://name" references resolved via the secrets manager.
        description:
          type: string
    MCPServerList:
      type: array
      items:
        "$ref": "#/components/schemas/MCPServer"
    MCPTestResult:
      type: object
      required:
      - ok
      - latencyMs
      properties:
        ok:
          type: boolean
        error:
          type: string
        latencyMs:
          type: integer
        toolCount:
          type: integer
        tools:
          type: array
          items:
            type: string
    StorageInfo:
      type: object
      required:
      - configured
      - usedBytes
      - objectCount
      properties:
        configured:
          type: boolean
        bucket:
          type: string
        usedBytes:
          type: integer
        objectCount:
          type: integer
        capacityBytes:
          type: integer
          description: Optional; sourced from S3_CAPACITY_BYTES.
        breakdown:
          type: array
          items:
            type: object
            required:
            - prefix
            - bytes
            - count
            properties:
              prefix:
                type: string
              bytes:
                type: integer
              count:
                type: integer
    StorageObjectEntry:
      type: object
      required:
      - key
      - size
      - lastModified
      properties:
        key:
          type: string
        size:
          type: integer
        lastModified:
          type: string
          format: date-time
        etag:
          type: string
    StorageObjectList:
      type: object
      required:
      - prefix
      - bucket
      - entries
      - count
      properties:
        prefix:
          type: string
        bucket:
          type: string
        entries:
          type: array
          items:
            "$ref": "#/components/schemas/StorageObjectEntry"
        count:
          type: integer
    StorageObject:
      type: object
      required:
      - key
      - size
      - encoding
      - content
      properties:
        key:
          type: string
        contentType:
          type: string
        size:
          type: integer
        etag:
          type: string
        encoding:
          type: string
          description: '"text" (UTF-8 inline) or "base64" (binary).'
        content:
          type: string
    StoragePutResult:
      type: object
      required:
      - key
      - size
      properties:
        key:
          type: string
        contentType:
          type: string
        size:
          type: integer
        etag:
          type: string
    StorageDeleteResult:
      type: object
      required:
      - key
      - deleted
      properties:
        key:
          type: string
        deleted:
          type: integer
          description: Object count removed (1 for a leaf, N for a prefix).
    Memory:
      type: object
      required:
      - id
      - profileName
      - rawInput
      - processedContent
      - summary
      - category
      - source
      - confidence
      - createdAt
      - lastAccessedAt
      - accessCount
      - stalenessScore
      - isActive
      - version
      properties:
        id:
          type: string
        profileName:
          type: string
        rawInput:
          type: string
        processedContent:
          type: string
        summary:
          type: string
        category:
          type: string
          description: preference | fact | behavior | context | general.
        source:
          type: string
          description: '"explicit" (agent-saved) or "inferred" (post-run extraction).'
        confidence:
          type: number
        createdAt:
          type: string
          format: date-time
        lastAccessedAt:
          type: string
          format: date-time
        accessCount:
          type: integer
        stalenessScore:
          type: number
        isActive:
          type: boolean
        version:
          type: integer
    MemoryCreateRequest:
      type: object
      required:
      - rawInput
      properties:
        rawInput:
          type: string
        processedContent:
          type: string
        summary:
          type: string
        category:
          type: string
        source:
          type: string
        confidence:
          type: number
    MemoryRelevance:
      type: object
      required:
      - score
      - recency
      - usage
      - topic
      properties:
        score:
          type: number
        recency:
          type: number
        usage:
          type: number
        topic:
          type: number
    ScoredMemory:
      type: object
      required:
      - memory
      - relevance
      properties:
        memory:
          "$ref": "#/components/schemas/Memory"
        relevance:
          "$ref": "#/components/schemas/MemoryRelevance"
    MemoryListResponse:
      type: object
      required:
      - total
      - memories
      properties:
        profile:
          type: string
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        memories:
          type: array
          items:
            "$ref": "#/components/schemas/Memory"
    MemorySearchResponse:
      type: object
      required:
      - profile
      - query
      - count
      - results
      properties:
        profile:
          type: string
        query:
          type: string
        count:
          type: integer
        results:
          type: array
          items:
            "$ref": "#/components/schemas/ScoredMemory"
    MemoryBankSnapshot:
      type: object
      required:
      - total
      - profilesWithMemory
      - memories
      properties:
        total:
          type: integer
        profilesWithMemory:
          type: integer
        memories:
          type: object
          additionalProperties:
            type: array
            items:
              "$ref": "#/components/schemas/Memory"
    MemoryBankStats:
      type: object
      required:
      - totalMemories
      - profilesWithMemory
      - perProfile
      properties:
        totalMemories:
          type: integer
        profilesWithMemory:
          type: integer
        perProfile:
          type: object
          additionalProperties:
            type: integer
    Tenant:
      type: object
      required:
      - id
      - displayName
      - status
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          description: Tenant slug (`default`, `acme`, `zenith`, ...).
        displayName:
          type: string
        status:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TenantList:
      type: object
      required:
      - total
      - tenants
      properties:
        total:
          type: integer
        tenants:
          type: array
          items:
            "$ref": "#/components/schemas/Tenant"
    TenantCreateRequest:
      type: object
      required:
      - id
      properties:
        id:
          type: string
        displayName:
          type: string
          description: Defaults to `id` when empty.
        metadata:
          type: object
          additionalProperties: true
    TenantUpdateRequest:
      type: object
      description: |
        Empty strings mean "no change"; nil metadata means "no change".
        Sending an explicit empty object for metadata replaces the value
        with `{}`.
      properties:
        displayName:
          type: string
        status:
          type: string
        metadata:
          type: object
          additionalProperties: true
    Secret:
      type: object
      required:
      - name
      - algorithm
      - createdAt
      - updatedAt
      description: |
        Metadata-only projection of a secrets row. Plaintext and
        ciphertext are never present on the wire — list/read endpoints
        never return them. Plaintext is only valid on the request body of
        POST/PUT.
      properties:
        name:
          type: string
        key:
          type: string
          description: |
            Canonical variable name the secret's value is meant to
            populate (e.g. `AWS_ACCESS_KEY_ID`, `ANTHROPIC_API_KEY`).
            Free-text; empty for legacy/untyped rows.
        description:
          type: string
        algorithm:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SecretList:
      type: object
      required:
      - total
      - secrets
      properties:
        total:
          type: integer
        secrets:
          type: array
          items:
            "$ref": "#/components/schemas/Secret"
    SecretCreateRequest:
      type: object
      required:
      - plaintext
      description: |
        Body shape for POST /api/secrets and PUT /api/secrets/{name}.
        Plaintext is required on writes; it is NEVER returned on reads,
        never logged, and never round-tripped.
      properties:
        name:
          type: string
        key:
          type: string
          description: |
            Optional canonical variable name (e.g. `AWS_ACCESS_KEY_ID`).
            Free-text; empty means untyped.
        plaintext:
          type: string
        description:
          type: string
    ConnectedAppProvider:
      type: object
      required:
      - name
      - configured
      properties:
        name:
          type: string
        configured:
          type: boolean
    ConnectedAppProviderList:
      type: object
      required:
      - providers
      properties:
        providers:
          type: array
          items:
            "$ref": "#/components/schemas/ConnectedAppProvider"
    ConnectAppRequest:
      type: object
      required:
      - appSlug
      properties:
        appSlug:
          type: string
        scope:
          type: string
          description: '"tenant" (default) or "end_user".'
        endUserId:
          type: string
          description: Required when `scope` is `end_user`.
        callbackUrl:
          type: string
    InitiateConnectResult:
      type: object
      required:
      - connectionId
      - status
      properties:
        connectionId:
          type: string
        externalId:
          type: string
        redirectUrl:
          type: string
        status:
          type: string
          description: pending | active | revoked | error.
    AppConnection:
      type: object
      required:
      - id
      - tenantId
      - provider
      - appSlug
      - scope
      - externalId
      - status
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
        tenantId:
          type: string
        provider:
          type: string
        appSlug:
          type: string
        scope:
          type: string
        endUserId:
          type: string
        externalId:
          type: string
        status:
          type: string
        mcpServerName:
          type: string
        redirectUrl:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AppConnectionList:
      type: object
      required:
      - connections
      properties:
        connections:
          type: array
          items:
            "$ref": "#/components/schemas/AppConnection"
    RepairConnectionResult:
      type: object
      required:
      - id
      properties:
        id:
          type: string
        mcpServerUrl:
          type: string
        mcpServerName:
          type: string
    SkillImportResult:
      type: object
      required:
      - imported
      - skipped
      properties:
        imported:
          type: array
          items:
            "$ref": "#/components/schemas/Skill"
        skipped:
          type: array
          items:
            type: object
            required:
            - name
            - reason
            properties:
              name:
                type: string
              reason:
                type: string
    RepairAction:
      type: object
      required:
      - type
      description: |
        Body for POST /api/workflows/runs/{id}/repair. Type drives behaviour:
        retry_node (reset to pending), replace_node (overwrite profile /
        prompt / schema), add_dependency (insert prep node), or abort.
      properties:
        type:
          type: string
          description: retry_node | replace_node | add_dependency | abort.
        nodeId:
          type: string
        replacement:
          "$ref": "#/components/schemas/PlanNode"
        dependsOn:
          type: array
          items:
            type: string
    PublishedAgent:
      type: object
      required:
      - id
      - tenantId
      - profileName
      - slug
      - visibility
      - authMode
      - allowedOrigins
      - rateLimitRpm
      - syncMaxDurationSeconds
      - exposeToolEvents
      - enabled
      - createdAt
      - updatedAt
      description: Published-agent configuration exposed through the control-plane
        API.
      properties:
        id:
          type: string
          description: "`pub_<22 base32 chars>`."
        tenantId:
          type: string
        profileName:
          type: string
        slug:
          type: string
        visibility:
          type: string
          description: "`private` | `org` | `public`."
        authMode:
          type: string
          description: "`api_key` | `jwt`."
        allowedOrigins:
          type: array
          items:
            type: string
        rateLimitRpm:
          type: integer
        syncMaxDurationSeconds:
          type: integer
          description: 1-270 inclusive.
        conversationTtlDays:
          type:
          - integer
          - 'null'
          description: Null means keep history forever.
        exposeToolEvents:
          type: boolean
        enabled:
          type: boolean
        unpublishedAt:
          type:
          - string
          - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PublishedAgentWithURL:
      allOf:
      - "$ref": "#/components/schemas/PublishedAgent"
      - type: object
        properties:
          publicUrl:
            type: string
            description: |
              Externally-visible chat endpoint URL. Empty / omitted
              when `CHAT_GATEWAY_PUBLIC_HOST` is unset.
    PublishedAgentList:
      type: object
      required:
      - total
      - publishedAgents
      properties:
        total:
          type: integer
        publishedAgents:
          type: array
          items:
            "$ref": "#/components/schemas/PublishedAgentWithURL"
    PublishRequest:
      type: object
      description: |
        Body for POST /api/profiles/{name}/publish. Every field is
        optional; defaults are filled in server-side. When `slug` is
        omitted it is derived from the profile name (lowercase, runs
        of non-`[a-z0-9]` collapse to `-`, leading/trailing dashes
        trimmed). When the derived value fails slug validation, the
        endpoint returns 400 `profile_name_not_slug_safe`.
      properties:
        slug:
          type: string
        visibility:
          type: string
          description: "`private` (default) | `org` | `public`."
        authMode:
          type: string
          description: "`api_key` (default) | `jwt`."
        allowedOrigins:
          type: array
          items:
            type: string
        rateLimitRpm:
          type: integer
        syncMaxDurationSeconds:
          type: integer
          description: 1-270 inclusive. Defaults to 60.
        conversationTtlDays:
          type:
          - integer
          - 'null'
          description: Null means keep forever (default).
        exposeToolEvents:
          type: boolean
    PublishUpdateRequest:
      type: object
      description: |
        Body for PATCH /api/profiles/{name}/published. Same shape as
        PublishRequest minus the (immutable) `slug`; adds `enabled` so
        the dashboard can pause without unpublishing. Only fields that
        are present in the body are persisted.
      properties:
        visibility:
          type: string
        authMode:
          type: string
        allowedOrigins:
          type: array
          items:
            type: string
        rateLimitRpm:
          type: integer
        syncMaxDurationSeconds:
          type: integer
        conversationTtlDays:
          type:
          - integer
          - 'null'
        exposeToolEvents:
          type: boolean
        enabled:
          type: boolean
    APIKeyMetadata:
      type: object
      required:
      - id
      - tenantId
      - publishedId
      - label
      - createdAt
      description: |
        API key metadata. The plaintext token is NEVER present in this
        shape — that field is only returned by POST /keys.
      properties:
        id:
          type: string
          description: "`key_<22 base32 chars>`."
        tenantId:
          type: string
        publishedId:
          type: string
        label:
          type: string
        lastUsedAt:
          type:
          - string
          - 'null'
          format: date-time
        revokedAt:
          type:
          - string
          - 'null'
          format: date-time
        expiresAt:
          type:
          - string
          - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
    APIKeyList:
      type: object
      required:
      - total
      - keys
      properties:
        total:
          type: integer
        keys:
          type: array
          items:
            "$ref": "#/components/schemas/APIKeyMetadata"
    APIKeyIssued:
      allOf:
      - "$ref": "#/components/schemas/APIKeyMetadata"
      - type: object
        required:
        - token
        properties:
          token:
            type: string
            description: |
              Plaintext API key (`ao_<env>_<22 base32 chars>`).
              Returned exactly once; subsequent GETs omit it.
    IssueKeyRequest:
      type: object
      description: |
        Body for POST /api/profiles/{name}/keys. Both fields are
        optional. Empty `label` is allowed; nil `expiresAt` means the
        key never expires.
      properties:
        label:
          type: string
        expiresAt:
          type:
          - string
          - 'null'
          format: date-time
    TenantAPIKeyMetadata:
      type: object
      description: |
        A tenant-scoped control-plane API key. The plaintext token and
        the stored hash are never included.
      required:
      - id
      - tenantId
      - name
      - role
      - createdBy
      - createdAt
      properties:
        id:
          type: string
          description: "`key_<22 base32 chars>` identifier."
        tenantId:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
          - owner
          - admin
          - member
          - viewer
          description: RBAC role the key acts with (inherited from the minter).
        createdBy:
          type: string
          description: Minter id — a Clerk user id, or `key:<id>` if minted via a
            key.
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type:
          - string
          - 'null'
          format: date-time
        revokedAt:
          type:
          - string
          - 'null'
          format: date-time
        expiresAt:
          type:
          - string
          - 'null'
          format: date-time
    TenantAPIKeyList:
      type: object
      required:
      - keys
      properties:
        keys:
          type: array
          items:
            "$ref": "#/components/schemas/TenantAPIKeyMetadata"
    TenantAPIKeyIssued:
      allOf:
      - "$ref": "#/components/schemas/TenantAPIKeyMetadata"
      - type: object
        required:
        - token
        properties:
          token:
            type: string
            description: |
              Plaintext API key (`ao_<env>_<22 base32 chars>`).
              Returned exactly once; subsequent GETs omit it.
    IssueTenantKeyRequest:
      type: object
      description: |
        Body for POST /api/api-keys. Both fields are optional. Empty
        `name` is allowed; nil `expiresAt` means the key never expires.
      properties:
        name:
          type: string
        expiresAt:
          type:
          - string
          - 'null'
          format: date-time
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    NoContent:
      description: Success, no body
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    ServiceUnavailable:
      description: Dependency not wired (e.g. DB, S3, secrets)
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
