        is derived from the profile name by lowercasing and replacing
        runs of non-`[a-z0-9]` with `-`. When the derived value fails
        slug validation, returns 400 `profile_name_not_slug_safe` and
        the caller must supply `slug` explicitly.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PublishRequest"
      responses:
