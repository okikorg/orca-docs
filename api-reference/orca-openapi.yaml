---
openapi: 3.1.0
info:
  title: Orca Control Plane API
  version: 0.1.0
  description: HTTP API for managing Orca agents, runs, sessions, skills, MCP servers,
    storage, memory, keys, publishing, billing, and workflows. Operations are tenant-scoped
    via the X-Tenant-ID header when tenant selection is required.
x-fern-global-headers:
- header: X-Tenant-ID
  name: tenantId
  optional: true
  x-fern-default: default
servers:
- url: http://localhost:8080
  description: Local Orca API
- url: "{baseUrl}"
  description: Custom
  variables:
    baseUrl:
      default: http://localhost:8080
security:
- BearerAuth: []
tags:
- name: Profiles
- name: Pools
- name: Sessions
- name: Runs
- name: Workflows
- name: Skills
- name: MCP
- name: Storage
- name: Memory
- name: Tenants
- name: Secrets
- name: Stats
- name: Billing
- name: Sandbox
- name: ConnectedApps
- name: Publishing
- name: Misc
paths:
  "/healthz":
    get:
      tags:
      - Misc
      x-fern-sdk-group-name: misc
      operationId: health
      x-fern-sdk-method-name: health
      summary: Liveness probe
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: ok
  "/api/profiles":
    get:
      tags:
      - Profiles
      x-fern-sdk-group-name: profiles
      operationId: listProfiles
      x-fern-sdk-method-name: list
      summary: List agent profiles
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      responses:
        '200':
          description: All profiles registered for the active tenant.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProfileList"
    post:
      tags:
      - Profiles
      x-fern-sdk-group-name: profiles
      operationId: createProfile
      x-fern-sdk-method-name: create
      summary: Create a profile
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Profile"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Profile"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '409':
          "$ref": "#/components/responses/Error"
  "/api/profiles/{name}":
    get:
      tags:
      - Profiles
      x-fern-sdk-group-name: profiles
      operationId: getProfile
      x-fern-sdk-method-name: get
      summary: Get a profile by name
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The profile
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Profile"
        '404':
          "$ref": "#/components/responses/NotFound"
    put:
      tags:
      - Profiles
      x-fern-sdk-group-name: profiles
      operationId: updateProfile
      x-fern-sdk-method-name: update
      summary: Update or rename a profile
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Profile"
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Profile"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Error"
    delete:
      tags:
      - Profiles
      x-fern-sdk-group-name: profiles
      operationId: deleteProfile
      x-fern-sdk-method-name: delete
      summary: Delete a profile
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          "$ref": "#/components/responses/NoContent"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/profiles/{name}/changes":
    get:
      tags:
      - Profiles
      x-fern-sdk-group-name: profiles
      operationId: listProfileChanges
      x-fern-sdk-method-name: listChanges
      summary: List profile change-history entries (newest first)
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Audit-style log of create / update / delete events.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProfileChangeList"
  "/api/pools":
    get:
      tags:
      - Pools
      x-fern-sdk-group-name: pools
      operationId: listPools
      x-fern-sdk-method-name: list
      summary: List agent pools
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      responses:
        '200':
          description: All pools registered for the active tenant.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PoolList"
    post:
      tags:
      - Pools
      x-fern-sdk-group-name: pools
      operationId: createPool
      x-fern-sdk-method-name: create
      summary: Create a pool
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Pool"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Pool"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '409':
          "$ref": "#/components/responses/Error"
  "/api/pools/{name}":
    patch:
      tags:
      - Pools
      x-fern-sdk-group-name: pools
      operationId: updatePool
      x-fern-sdk-method-name: update
      summary: Patch a pool (partial update)
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Pool"
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Pool"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '404':
          "$ref": "#/components/responses/NotFound"
    delete:
      tags:
      - Pools
      x-fern-sdk-group-name: pools
      operationId: deletePool
      x-fern-sdk-method-name: delete
      summary: Delete a pool
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          "$ref": "#/components/responses/NoContent"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/pools/{name}/members/{profile}":
    post:
      tags:
      - Pools
      x-fern-sdk-group-name: pools
      operationId: addPoolMember
      x-fern-sdk-method-name: addMember
      summary: Add a profile to a pool (idempotent)
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      - name: profile
        in: path
        required: true
        schema:
          type: string
      - name: role
        in: query
        required: false
        description: 'Pool role: lead | member | observer (default member).'
        schema:
          type: string
      responses:
        '204':
          "$ref": "#/components/responses/NoContent"
        '404':
          "$ref": "#/components/responses/NotFound"
    delete:
      tags:
      - Pools
      x-fern-sdk-group-name: pools
      operationId: removePoolMember
      x-fern-sdk-method-name: removeMember
      summary: Remove a profile from a pool (idempotent)
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      - name: profile
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          "$ref": "#/components/responses/NoContent"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/sessions":
    get:
      tags:
      - Sessions
      x-fern-sdk-group-name: sessions
      operationId: listSessions
      x-fern-sdk-method-name: list
      summary: List sessions
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      responses:
        '200':
          description: Sessions visible to the active tenant.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SessionList"
    post:
      tags:
      - Sessions
      x-fern-sdk-group-name: sessions
      operationId: createSession
      x-fern-sdk-method-name: create
      summary: Create a session for a profile
      description: |
        Mints a runtime session bound to the named profile. Used by the
        public chat-gateway's "first turn of a new conversation" path:
        the gateway needs a sess_... id before dispatching the run so
        the conversations row can be inserted with a real session_id.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - profile
              properties:
                profile:
                  type: string
                  description: AgentProfile.Name to bind the session to.
      responses:
        '201':
          description: Session minted.
          content:
            application/json:
              schema:
                type: object
                required:
                - sessionId
                - profile
                properties:
                  sessionId:
                    type: string
                  profile:
                    type: string
        '400':
          "$ref": "#/components/responses/BadRequest"
  "/api/sessions/{id}":
    get:
      tags:
      - Sessions
      x-fern-sdk-group-name: sessions
      operationId: retrieveSession
      x-fern-sdk-method-name: retrieve
      summary: Get a session by id
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Session"
        '404':
          "$ref": "#/components/responses/NotFound"
    delete:
      tags:
      - Sessions
      x-fern-sdk-group-name: sessions
      operationId: deleteSession
      x-fern-sdk-method-name: delete
      summary: Shut a session down
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          "$ref": "#/components/responses/NoContent"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/sessions/{id}/runs":
    get:
      tags:
      - Sessions
      x-fern-sdk-group-name: sessions
      operationId: listSessionRuns
      x-fern-sdk-method-name: listRuns
      summary: List runs for a session (newest first)
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Run summaries for the session.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RunSummaryList"
  "/api/profiles/{name}/runs":
    get:
      tags:
      - Profiles
      x-fern-sdk-group-name: profiles
      operationId: listProfileRuns
      x-fern-sdk-method-name: listRuns
      summary: List runs for a profile (newest first)
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Run summaries for the profile.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RunSummaryList"
  "/api/orca/seed":
    post:
      tags:
      - Misc
      x-fern-sdk-group-name: misc
      operationId: seedOrca
      x-fern-sdk-method-name: seedOrca
      summary: Idempotently re-create the canonical "orca" helper profile
      description: |
        Used by the dashboard's Quickstart "Restore Orca" button. The
        endpoint is safe to call repeatedly; it has no body and
        always returns the resulting profile snapshot.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      responses:
        '200':
          description: Orca profile state after the call.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
  "/api/runs":
    get:
      tags:
      - Runs
      x-fern-sdk-group-name: runs
      operationId: listRuns
      x-fern-sdk-method-name: list
      summary: List runs (newest first)
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      responses:
        '200':
          description: Run summaries.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RunSummaryList"
    post:
      tags:
      - Runs
      x-fern-sdk-group-name: runs
      operationId: createRun
      x-fern-sdk-method-name: create
      summary: Start a run
      description: |
        Accepts a SubTask, mints a sessionId when missing, and kicks off a
        background run. Returns 202 with the assigned `runId` and
        `sessionId` immediately; events stream via the SSE endpoints.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RunCreateRequest"
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required:
                - runId
                - sessionId
                properties:
                  runId:
                    type: string
                  sessionId:
                    type: string
        '400':
          "$ref": "#/components/responses/BadRequest"
        '500':
          "$ref": "#/components/responses/Error"
  "/api/runs/{id}":
    get:
      tags:
      - Runs
      x-fern-sdk-group-name: runs
      operationId: retrieveRun
      x-fern-sdk-method-name: retrieve
      summary: Get a run with its buffered event tail
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Run detail (summary + events).
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RunDetail"
        '404':
          "$ref": "#/components/responses/NotFound"
    delete:
      tags:
      - Runs
      x-fern-sdk-group-name: runs
      operationId: cancelRun
      x-fern-sdk-method-name: cancel
      summary: Cancel an in-flight run
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Cancellation requested
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/runs/{id}/events":
    get:
      tags:
      - Runs
      x-fern-sdk-group-name: runs
      operationId: replayRunEvents
      x-fern-sdk-method-name: replayEvents
      summary: Replay a run's events as newline-delimited JSON
      description: |
        Newline-delimited JSON. First line is a header object; subsequent
        lines are run events; final line is a finish marker. See
        `runtime/httpapi/run_events_handler.go` for the frame shape.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: |
            Newline-delimited JSON. First line is a header object;
            subsequent lines are run events; final line is a finish
            marker. See `runtime/httpapi/run_events_handler.go` for the
            frame shape.
          content:
            application/x-ndjson:
              schema:
                type: string
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/runs/{id}/stream":
    get:
      tags:
      - Runs
      x-fern-sdk-group-name: runs
      operationId: streamRun
      x-fern-sdk-method-name: stream
      summary: Subscribe to a live run (SSE)
      description: |
        Server-sent events stream. Replays buffered events first, then
        fans out new events as they arrive. Each frame is `data: <json>\n\n`
        where the body is a single `Event`. Heartbeat lines (`: ping`)
        every ~15s keep proxies from buffering. The connection closes
        once the run reaches a terminal status.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: SSE stream of `Event` JSON frames.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/workflows/runs":
    post:
      tags:
      - Workflows
      operationId: createWorkflowRun
      summary: Create a workflow run
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PlanCreateRequest"
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    get:
      tags:
      - Workflows
      operationId: listWorkflowRuns
      summary: List workflow runs
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: orchestratorRunId
        in: query
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
      - name: since
        in: query
        required: false
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Matching workflow runs.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PlanList"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/api/workflows/runs/{id}":
    get:
      tags:
      - Workflows
      operationId: retrieveWorkflowRun
      summary: Get a workflow run snapshot
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Workflow run
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Plan"
        '404':
          "$ref": "#/components/responses/NotFound"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/api/workflows/runs/{id}/start":
    post:
      tags:
      - Workflows
      operationId: startWorkflowRun
      summary: Start a workflow run
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '404':
          "$ref": "#/components/responses/NotFound"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/api/workflows/runs/{id}/cancel":
    post:
      tags:
      - Workflows
      operationId: cancelWorkflowRun
      summary: Cancel a workflow run
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/api/workflows/runs/{id}/repair":
    post:
      tags:
      - Workflows
      operationId: repairWorkflowRun
      summary: Repair a paused workflow run
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RepairAction"
      responses:
        '202':
          description: Repair accepted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Error"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/api/workflows/runs/{id}/stream":
    get:
      tags:
      - Workflows
      operationId: streamWorkflowRun
      summary: Subscribe to workflow run status changes
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: SSE stream of workflow-run status frames.
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          "$ref": "#/components/responses/NotFound"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/api/workflows/definitions":
    post:
      tags:
      - Workflows
      operationId: createWorkflowDefinition
      summary: Create a workflow definition
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Object"
      responses:
        '201':
          description: Created workflow definition.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '400':
          "$ref": "#/components/responses/BadRequest"
    get:
      tags:
      - Workflows
      operationId: listWorkflowDefinitions
      summary: List workflow definitions
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      responses:
        '200':
          description: Workflow definitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Object"
  "/api/workflows/definitions/{id}":
    get:
      tags:
      - Workflows
      operationId: retrieveWorkflowDefinition
      summary: Get a workflow definition
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Workflow definition.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '404':
          "$ref": "#/components/responses/NotFound"
    patch:
      tags:
      - Workflows
      operationId: updateWorkflowDefinition
      summary: Update a workflow definition
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Object"
      responses:
        '200':
          description: Updated workflow definition.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Object"
        '400':
