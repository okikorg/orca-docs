      summary: Initiate an app connection (returns a redirect URL when applicable)
      description: |
        Mints an `AppConnection` row and asks the provider to begin the
        OAuth/credentials handshake. When the provider returns a
        deterministic MCP server URL (Composio) and the connection lands
