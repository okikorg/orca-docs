    patch:
      tags:
      - Publishing
      x-fern-sdk-group-name: publishing
      operationId: updatePublishedAgent
      x-fern-sdk-method-name: update
      summary: Partial update over the active published row
      description: |
        Slug is intentionally not patchable; slug rotation requires
        unpublish + republish. All other fields are optional and only
        the supplied ones are persisted.
      parameters:
      - "$ref": "#/components/parameters/TenantId"
      - name: name
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
