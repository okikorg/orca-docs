          "$ref": "#/components/responses/ServiceUnavailable"
    delete:
      tags:
      - Publishing
      x-fern-sdk-group-name: publishing
      operationId: unpublishAgent
      x-fern-sdk-method-name: unpublish
      summary: Soft-delete the active published row
      description: |
